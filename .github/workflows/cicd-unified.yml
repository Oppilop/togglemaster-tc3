name: ToggleMaster CICD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  lint:
    name: Code Quality (Linter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- LINT PARA GO (Serviços: auth-service, evaluation-service) ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Lint Go Services
        # O golangci-lint-action v6 suporta varrer subdiretórios se você
        # não definir um 'working-directory' fixo e usar o argumento ./services/...
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./services/...

      # --- LINT PARA PYTHON (Serviços: analytics, flag, targeting) ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run Python Lint
        run: |
          pip install flake8
          echo "Iniciando linting de serviços Python em services/..."
          
          # Loop para encontrar diretórios que contenham arquivos .py
          # e rodar o flake8 neles individualmente
          for dir in services/*-service; do
            if [ -d "$dir" ] && ls "$dir"/*.py >/dev/null 2>&1; then
              echo "Checking $dir..."
              flake8 "$dir" --count --max-line-length=127 --statistics || exit 1
            fi
          done

  # ─────────────────────────────────────────────────
  # JOB 1: SonarCloud — SAST + Code Quality
  # ─────────────────────────────────────────────────
  sonarcloud:
    name: 'SonarCloud SAST'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'


      # - name: Install Dependencies and Run Tests
      #   run: |
      #     # 1. Testes Go (Entrando em cada diretório)
      #     echo "Rodando testes Go..."
          
      #     echo "Testing Auth..."
      #     cd services/auth-service && go test ./... -coverprofile=../../coverage-auth.out && cd ../..
          
      #     echo "Testing Evaluation..."
      #     cd services/evaluation-service && go test ./... -coverprofile=../../coverage-eval.out && cd ../..

      #     # Unificar os reports para o Sonar (opcional, ou aponte os dois no sonar-project.properties)
      #     cat coverage-auth.out > coverage-go.out
      #     tail -n +2 coverage-eval.out >> coverage-go.out

      #     # 2. Testes Python
      #     echo "Rodando testes Python..."
      #     python -m pip install pytest pytest-cov
      #     for s in "analytics-service" "flag-service" "targeting-service"; do
      #       if [ -f "services/$s/requirements.txt" ]; then
      #         pip install -r services/$s/requirements.txt
      #       fi
      #     done
      #     pytest services/analytics-service services/flag-service services/targeting-service \
      #       --cov=services/analytics-service \
      #       --cov=services/flag-service \
      #       --cov=services/targeting-service \
      #       --cov-report=xml:coverage-python.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────
  # JOB 2: Trivy — IaC + Dockerfile
  # ─────────────────────────────────────────────────
  trivy-iac:
    name: 'Trivy IaC + Dockerfile'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ─────────────────────────────────────────────────
  # JOB 3: Trivy — Container Scan (Loop para 5 imagens)
  # ─────────────────────────────────────────────────
  trivy-container:
    name: 'Trivy Container Scan'
    runs-on: ubuntu-latest
    needs: [sonarcloud, trivy-iac]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Scan All Images
        run: |
          SERVICES=("auth" "evaluation" "analytics" "flag" "targeting")
          
          # Instala Trivy localmente
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          
          for S in "${SERVICES[@]}"; do
            IMAGE_NAME="togglemaster-$S:${{ github.sha }}"
            echo "Building and Scanning: $IMAGE_NAME"
            
            docker build -t $IMAGE_NAME ./services/${S}-service
            trivy image --severity CRITICAL,HIGH --exit-code 0 --format table $IMAGE_NAME
          done

  # ─────────────────────────────────────────────────
  # JOB 4: Deploy (Terraform + ECR Push)
  # ─────────────────────────────────────────────────
  terraform-and-deploy:
    runs-on: ubuntu-latest
    needs: [trivy-container] # Garante que só faz deploy se os scans passarem
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
          
      # 2. INSTALA O TERRAFORM 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init & Apply
        working-directory: ./terraform
        env:
          TF_VAR_infisical_client_id: ${{ secrets.INFISICAL_CLIENT_ID }}
          TF_VAR_infisical_client_secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          terraform init
          
          # Passo 1: Cria primeiro a base (VPC e Cluster EKS)
          # Isso garante que o endpoint do cluster exista antes do Terraform tentar configurar o provider K8s
          terraform apply -target=module.vpc -target=aws_eks_cluster.eks_cluster -target=aws_eks_node_group.node_group -auto-approve
          
          # Passo 2: Aplica o restante (RDS, ElastiCache, Namespaces, Jobs e Services)
          # Agora o provider kubernetes conseguirá se conectar sem erro
          terraform apply -auto-approve
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICES=("auth" "flag" "targeting" "evaluation" "analytics")
          for SERVICE in "${SERVICES[@]}"; do
            docker build -t $ECR_REGISTRY/togglemaster-$SERVICE:latest ./services/${SERVICE}-service
            docker push $ECR_REGISTRY/togglemaster-$SERVICE:latest
          done

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name togglemaster-eks-prod

      - name: Restart Deployments
        run: |
          for ns in auth flag targeting evaluation analytics; do
            kubectl rollout restart deployment -n ${ns}-namespace || echo "Namespace $ns não tem deployments ativos ainda"
          done