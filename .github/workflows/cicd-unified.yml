name: ToggleMaster CICD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────
  # ETAPA 1: QUALIDADE DE CÓDIGO (Linter)
  # ─────────────────────────────────────────────────
  lint:
    name: Code Quality (Linter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Lint Auth Service
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/auth-service
          args: --timeout=5m -D errcheck

      - name: Lint Evaluation Service
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/evaluation-service
          args: --timeout=5m -D errcheck --exclude="SA1019"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run Python Lint
        run: |
          pip install flake8
          echo "Iniciando verificação de estilo PEP8..."
          for dir in services/*-service; do
            if [ -d "$dir" ] && ls "$dir"/*.py >/dev/null 2>&1; then
              echo "Analisando: $dir"
              # Ignoramos erros de:
              # E701: Múltiplos comandos na mesma linha (ex: if x: return)
              # W291/W293: Espaços no final da linha ou em linhas vazias
              # W292: Falta de linha vazia no final do arquivo
              # E302/E305: Falta de 2 linhas entre funções
              # E261: Menos de 2 espaços antes de comentário
              flake8 "$dir" --count \
                --ignore=E302,E305,E261,E701,W291,W292,W293 \
                --max-line-length=127 \
                --statistics || exit 1
            fi
          done

  # ─────────────────────────────────────────────────
  # ETAPA 2: SEGURANÇA (SonarCloud e Trivy IaC rodando em paralelo)
  # ─────────────────────────────────────────────────
  sonarcloud:
    name: 'SonarCloud SAST'
    needs: lint  # <--- Agora ele espera o Linter passar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-iac:
    name: 'Trivy IaC + Dockerfile'
    needs: lint  # <--- Também espera o Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ─────────────────────────────────────────────────
  # ETAPA 3: SEGURANÇA DE ARTEFATO (Container Scan)
  # ─────────────────────────────────────────────────
  trivy-container:
    name: 'Trivy Container Scan'
    runs-on: ubuntu-latest
    needs: [sonarcloud, trivy-iac] # Espera os dois scans de segurança terminarem
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Scan All Images
        run: |
          SERVICES=("auth" "evaluation" "analytics" "flag" "targeting")
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          for S in "${SERVICES[@]}"; do
            IMAGE_NAME="togglemaster-$S:${{ github.sha }}"
            docker build -t $IMAGE_NAME ./services/${S}-service
            trivy image --severity CRITICAL,HIGH --exit-code 0 --format table $IMAGE_NAME
          done

  # ─────────────────────────────────────────────────
  # ETAPA 4: DEPLOY (Terraform + ECR)
  # ─────────────────────────────────────────────────
  terraform-and-deploy:
    name: 'Terraform and Deploy'
    runs-on: ubuntu-latest
    needs: [trivy-container] # Só inicia o deploy se a imagem for segura
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init & Apply
        working-directory: ./terraform
        env:
          TF_VAR_infisical_client_id: ${{ secrets.INFISICAL_CLIENT_ID }}
          TF_VAR_infisical_client_secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          terraform init
          terraform apply -target=module.vpc -target=aws_eks_cluster.eks_cluster -target=aws_eks_node_group.node_group -auto-approve
          terraform apply -auto-approve

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICES=("auth" "flag" "targeting" "evaluation" "analytics")
          for SERVICE in "${SERVICES[@]}"; do
            docker build -t $ECR_REGISTRY/togglemaster-$SERVICE:latest ./services/${SERVICE}-service
            docker push $ECR_REGISTRY/togglemaster-$SERVICE:latest
          done

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name togglemaster-eks-prod

      - name: Restart Deployments
        run: |
          for ns in auth flag targeting evaluation analytics; do
            kubectl rollout restart deployment -n ${ns}-namespace || echo "Namespace $ns ainda sem deployments"
          done