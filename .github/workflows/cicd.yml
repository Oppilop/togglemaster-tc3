name: CI/CD Pipeline - ToggleMaster

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build, Test & Lint
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Language (Go/Python)
        uses: actions/setup-go@v4 # Troque para setup-python se for Python
        with:
          go-version: '1.21'

      - name: Build & Unit Test
        run: |
          go build ./...
          go test ./...

      - name: Linter (Static Analysis)
        uses: golangci/golangci-lint-action@v3 # Use flake8/pylint para Python

  # 2. Security Scan (DevSecOps)
  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SCA: Verifica vulnerabilidades nas dependências
      - name: SCA Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1' # Bloqueia se encontrar algo
          severity: 'CRITICAL'

      # SAST: Verifica o código fonte
      - name: SAST Scan (Gosec/Bandit)
        run: |
          # Exemplo para Go: go install github.com/securego/gosec/v2/cmd/gosec@latest
          # gosec ./...
          echo "Executando SAST..."

  # 3. Docker Build, Container Scan & Push
  docker-deploy:
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Só push no ECR se for na Main
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Scan Image
        run: |
          docker build -t togglemaster-auth:${{ github.sha }} .
          # Container Scan com Trivy
          # trivy image --exit-code 1 --severity CRITICAL togglemaster-auth:${{ github.sha }}

      - name: Push Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/togglemaster-auth:${{ github.sha }}

  # 4. GitOps Trigger (Atualiza o Repo de Manifestos)
  update-manifests:
    needs: docker-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 'seu-usuario/togglemaster-gitops' # Seu repo de YAMLs
          token: ${{ secrets.GITOPS_TOKEN }} # Personal Access Token

      - name: Update Image Tag
        run: |
          sed -i "s|image:.*|image: ${{ secrets.ECR_REGISTRY }}/togglemaster-auth:${{ github.sha }}|g" manifests/auth-deployment.yaml
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git commit -am "Update auth image to ${{ github.sha }}"
          git push