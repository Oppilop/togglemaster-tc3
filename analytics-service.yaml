apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: analytics-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: 191468900606.dkr.ecr.us-east-1.amazonaws.com/analytics-service
          ports:
            - containerPort: 8005
          resources:
            requests:
              cpu: "250m"      # Reserva 1/4 de um núcleo
              memory: "256Mi"  # Reserva 256MB de RAM
            limits:
              cpu: "500m"      # Pode usar até meio núcleo se precisar
              memory: "512Mi"  # Teto de 512MB para não travar o nó
          envFrom:
          - secretRef:
              name: analytics-service-secrets
          - configMapRef:
              name: analytics-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: analytics-namespace
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
    - port: 8005
      targetPort: 8005
---
apiVersion: v1
kind: Secret
metadata:
  name: analytics-service-secrets
  namespace: analytics-namespace
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "ASIASZFDPSD7DRNQNHQR"
  AWS_SECRET_ACCESS_KEY: "A+chE8ZMqLvbQaNZ/NuviAS1ssdfBWXn9yGmacMB"
  AWS_SESSION_TOKEN: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
  namespace: analytics-namespace
data:
  ANALYTICS_PORT: "8005"
  AWS_REGION: "us-east-1"
  REDIS_URL: "rediss://clustercfg.togglemaster-redis-prod.n7s9nu.use1.cache.amazonaws.com:6379"
  AWS_SQS_URL: "https://sqs.us-east-1.amazonaws.com/191468900606/togglemaster-sqs-prod"
  AWS_DYNAMODB_TABLE: "ToggleMasterAnalytics"
