apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 191468900606.dkr.ecr.us-east-1.amazonaws.com/auth-service
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: auth-service-secrets
            - configMapRef:
                name: auth-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service    
  namespace: auth-namespace
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: auth-namespace
type: Opaque
data:
  DB_PASSWORD: UykqY0NPTnBjVGI6ISk3SUlDal9UNXQ1NTFJMA==
  MASTER_KEY: S0RGam5kQGZkamdqMmZnZGc=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: auth-namespace
data:
  DATABASE_URL: "postgres://postgres:S%29%2AcCONpcTb%3A%21%297IICj_T5t551I0@auth-postgres.czemuyq424d3.us-east-1.rds.amazonaws.com:5432/authdb"
  SERVICE_URL: "http://auth-service:8001"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service-ingress
  namespace: auth-namespace
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 8001  