apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: <ECR_REPO>/auth-service:latest
          ports:
            - containerPort: <>
          envFrom:
            - secretRef:
                name: auth-service-secrets
            - configMapRef:
                name: auth-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: auth-namespace
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: <>
      targetPort: <>
---
apiVersion: v1
kind: Secret
metadata:
  AUTH_MASTER_KEY: "admin-secreto-123"
  AUTH_DB_PASSWORD: "adminpass"
type: Opaque
stringData:
  DB_PASSWORD: "supersecret"
  JWT_SECRET: "jwtkey"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: auth-namespace
data:
  AUTH_DATABASE_URL: "postgres://admin:adminpass@postgres-auth:5432/authdb"
  AUTH_DB_HOST: "postgres-auth"
  AUTH_DB_USER: "admin"
  AUTH_DB_NAME: "authdb"
  AUTH_SERVICE_URL: "http://auth-service:8001"
