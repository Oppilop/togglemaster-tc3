apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 471112729436.dkr.ecr.us-east-1.amazonaws.com/analytics-service
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: auth-service-secrets
            - configMapRef:
                name: auth-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: auth-namespace
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Secret
metadata:
  AUTH_MASTER_KEY: "KDFjnd$jfd2@fdjgj2fgdg"
  AUTH_DB_PASSWORD: "adminpass"
type: Opaque
stringData:
  DB_PASSWORD: "(4JbeURfvtB.hI5Yw~5Wzc.qegqB"
  USER: "postgres"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: auth-namespace
data:
  AUTH_DATABASE_URL: "postgres://admin:adminpass@postgres-auth:5432/authdb"
  AUTH_DB_HOST: "postgres-auth"
  AUTH_DB_USER: "admin"
  AUTH_DB_NAME: "authdb"
  AUTH_SERVICE_URL: "http://auth-service:8001"
