apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: togglemaster-eks-prd
  region: us-east-1
  version: "1.31"
vpc:
  id: "vpc-0b45f905b09854000"  # ID da sua VPC existente
  subnets:
    private:
      us-east-1d: { id: "subnet-02b26668600d351b5" }
      us-east-1c: { id: "subnet-0c2edf784031f75d2" }
    public:
      us-east-1c: { id: "subnet-03881a4af8e6238a1" }
      us-east-1d: { id: "subnet-08cdb877e98362a5c" }
iam:
  serviceRoleARN: "arn:aws:iam::191468900606:role/LabRole"
managedNodeGroups:
  - name: standard-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20
    iam:
      instanceRoleARN: "arn:aws:iam::191468900606:role/LabRole"