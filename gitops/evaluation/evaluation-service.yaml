apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: evaluation-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
        - name: evaluation-service
          image: 191468900606.dkr.ecr.us-east-1.amazonaws.com/evaluation-service
          ports:
            - containerPort: 8004
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          env:
            # Integração dinâmica com o Redis do Terraform
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-db-config
                  key: REDIS_ENDPOINT
            # Usando a Role do IAM (LabRole) em vez de chaves manuais
            - name: AWS_REGION
              value: "us-east-1"
          envFrom:
            - secretRef:
                name: evaluation-service-secrets
            - configMapRef:
                name: evaluation-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: evaluation-namespace
spec:
  type: ClusterIP
  selector:
    app: evaluation-service
  ports:
    - port: 8004
      targetPort: 8004
---
apiVersion: v1
kind: Secret
metadata:
  name: evaluation-service-secrets
  namespace: evaluation-namespace
type: Opaque
stringData:
  # Mantenha apenas chaves de aplicação que não estão no Infisical/Terraform
  SERVICE_API_KEY: "tm_key_b9ae38912983943d80bc3a197f479784664a360f28666a72984482a9c2c10f77"
  # Removidas AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY e AWS_SESSION_TOKEN
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evaluation-service-config
  namespace: evaluation-namespace
data:
  EVALUATION_PORT: "8004"
  AUTH_SERVICE_URL: "http://auth-service.auth-namespace.svc.cluster.local:8001"
  FLAG_SERVICE_URL: "http://flag-service.flag-namespace.svc.cluster.local:8002"
  TARGETING_SERVICE_URL: "http://targeting-service.targeting-namespace.svc.cluster.local:8003"
  AWS_SQS_URL: "https://sqs.us-east-1.amazonaws.com/191468900606/togglemaster-queue"
  AWS_DYNAMODB_TABLE: "ToggleMasterAnalytics"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evaluation-service-ingress
  namespace: evaluation-namespace
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /evaluation(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: evaluation-service
                port:
                  number: 8004