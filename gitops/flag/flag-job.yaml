apiVersion: batch/v1
kind: Job
metadata:
  name: flag-postgres-init
  namespace: flag-namespace
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: flag-postgres-init-sql
        image: postgres:latest
        command: ["psql"]
        # Alterado para ler o host do ConfigMap gerado pelo Terraform
        args: 
          - "-h"
          - "$(DB_HOST)" 
          - "-U"
          - "masteruser" # O usuário que definimos no main.tf
          - "-d"
          - "togglemaster" # O db_name definido no main.tf
          - "-f"
          - "/mnt/init.sql"
        env:
          # Host vindo do Terraform
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: togglemaster-db-config
                key: DB_HOST_1
          # Senha vinda do Infisical via Terraform
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: togglemaster-db-secret
                key: password_1
        volumeMounts:
        - name: init-sql
          mountPath: /mnt
      volumes:
      - name: init-sql
        configMap:
          name: flag-postgres-init-configmap
---
# O Secret manual foi removido. O Job agora usa o 'togglemaster-db-secret'

apiVersion: v1
kind: ConfigMap
metadata:
  name: flag-postgres-init-configmap
  namespace: flag-namespace
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS flags (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) UNIQUE NOT NULL, 
      description TEXT,
      is_enabled BOOLEAN NOT NULL DEFAULT false,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON flags;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON flags
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();