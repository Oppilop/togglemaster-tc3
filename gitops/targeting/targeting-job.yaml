apiVersion: batch/v1
kind: Job
metadata:
  name: targeting-postgres-init
  namespace: targeting-namespace
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: targeting-postgres-init-sql
        image: postgres:latest
        command: ["psql"]
        args: 
          - "-h"
          - "$(DB_HOST)" 
          - "-U"
          - "masteruser"
          - "-d"
          - "togglemaster"
          - "-f"
          - "/mnt/init.sql"
        env:
          # Host dinâmico vindo do RDS de Targeting (Índice 2)
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: togglemaster-db-config
                key: DB_HOST_2
          # Senha segura vinda do Infisical (Índice 2)
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: togglemaster-db-secret
                key: password_2
        volumeMounts:
        - name: init-sql
          mountPath: /mnt
      volumes:
      - name: init-sql
        configMap:
          name: targeting-postgres-init-configmap
---
# Secret manual removido para usar a integração com o Terraform/Infisical

apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-postgres-init-configmap
  namespace: targeting-namespace
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS targeting_rules (
      id SERIAL PRIMARY KEY,
      flag_name VARCHAR(100) UNIQUE NOT NULL,
      is_enabled BOOLEAN NOT NULL DEFAULT true,
      rules JSONB NOT NULL,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON targeting_rules
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();