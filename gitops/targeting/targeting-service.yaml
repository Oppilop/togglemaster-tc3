apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: targeting-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
        - name: targeting-service
          # Imagem ajustada para o padrão do repositório ECR no Terraform
          image: 191468900606.dkr.ecr.us-east-1.amazonaws.com/togglemaster-targeting
          ports:
            - containerPort: 8003
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            # Host do RDS injetado pelo Terraform (Índice 2)
            - name: DB_HOST
              valueFrom:
                config_map_key_ref:
                  name: togglemaster-db-config
                  key: DB_HOST_2
            # Senha do Infisical injetada pelo Terraform (Índice 2)
            - name: DB_PASSWORD
              valueFrom:
                secret_key_ref:
                  name: togglemaster-db-secret
                  key: password_2
          envFrom:
            - configMapRef:
                name: targeting-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service
  namespace: targeting-namespace
spec:
  type: ClusterIP
  selector:
    app: targeting-service
  ports:
    - port: 8003
      targetPort: 8003
---
# Secret manual removido: a senha agora vem do Infisical via Terraform

apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-service-config
  namespace: targeting-namespace
data:
  PORT: "8003"
  AUTH_SERVICE_URL: "http://auth-service.auth-namespace.svc.cluster.local:8001"
  FLAG_SERVICE_URL: "http://flag-service.flag-namespace.svc.cluster.local:8002"
  # DATABASE_URL removida para evitar exposição de credenciais
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: targeting-service-ingress
  namespace: targeting-namespace
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /targeting(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: targeting-service
                port:
                  number: 8003