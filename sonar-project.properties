sonar.projectKey=Oppilop_togglemaster-tc3
sonar.organization=togglemaster-tc3-key

sonar.projectName=togglemaster-tc3
sonar.projectVersion=1.0

sonar.sources=services
sonar.exclusions=**/*.md, **/*.txt, **/test/**, **/*_test.go, **/tests/**
# sonar.tests=services
# sonar.test.inclusions=**/test_*.py
sonar.exclusions=**/__pycache__/**,**/*.pyc

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.9

# Caminhos para os relatórios de cobertura que geramos no workflow
sonar.go.coverage.reportPaths=coverage-go.out
sonar.python.coverage.reportPaths=coverage-python.xml

# Codificação
sonar.sourceEncoding=UTF-8